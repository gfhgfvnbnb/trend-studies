<style>

    --border: rgba(255,255,255,0.08);
    --text: #000000;

    font-family: var(--font-title);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ========== NAV ========== */
  nav {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(248, 246, 246, 0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    height: 52px;
  }
  .nav-logo {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -1px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    cursor: pointer;
  }
  .nav-icons { display: flex; gap: 20px; align-items: center; }
  .nav-icon {
    width: 32px; height: 32px;
    border-radius: 50%;
    border: 1.5px solid var(--border);

    cursor: pointer;
    transition: border-color 0.5s;
    color: var(--muted);
    font-size: 14px;

  .page.active { display: block; }

    align-items: flex-start;
    gap: 20px;
    margin-bottom: 20px;

  .avatar-wrap {

    flex-shrink: 0;
  }
  .avatar {

    height: 88px;

    font-weight: 800;
    color: white;
    letter-spacing: -2px;
    position: relative;

    inset: -3px;

    background: linear-gradient(135deg, var(--accent), var(--accent2));
    z-index: 0;
    animation: spin 4s linear infinite;

    position: absolute;
    inset: 3px;
    border-radius: 50%;
    background: var(--bg);

  .profile-handle {

    font-weight: 800;

  .profile-name {

    margin-top: 4px;

  .video-card {

    aspect-ratio: 9/16;
    background: var(--card);

    overflow: hidden;
    border-radius: 0;
    transition: transform 0.2s;
  }

    height: 100%;

    display: block;

  .card-bg {

    height: 100%;

    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
    font-weight: 800;
  }
  .card-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.55);
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.2s;
    flex-direction: column;
    gap: 4px;
  }
  .card-play {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: rgba(255,255,255,0.2);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card-play::after {
    content: '';
    border-left: 14px solid white;
    border-top: 8px solid transparent;
    border-bottom: 8px solid transparent;
    margin-left: 3px;
  }
  .card-views {
    font-size: 11px;
    font-weight: 700;
    color: white;
    font-family: var(--font-mono);
  }

  .card-views-bottom {
    position: absolute;
    bottom: 6px;
    left: 6px;
    display: flex;
    align-items: center;
    gap: 3px;
    font-size: 11px;
    font-weight: 600;
    color: white;
    font-family: var(--font-mono);
    text-shadow: 0 1px 4px rgba(0,0,0,0.8);
  }
  .card-views-bottom::before { content: '▶'; font-size: 9px; }

  .card-pinned {
    position: absolute;
    top: 6px;
    left: 6px;
    background: var(--accent);
    color: white;
    font-size: 9px;
    font-weight: 700;
    padding: 2px 6px;
    border-radius: 2px;
    font-family: var(--font-mono);
    letter-spacing: 0.5px;
  }

  .article-back:hover { color: var(--text); }
  .article-back::before {

    likes: "47k",
    comments: "1,2k",
    body: `<p>Depuis l'émergence de ChatGPT et des modèles de langage avancés, une question revient en boucle dans les médias et les conversations de bureau : <strong>nos emplois sont-ils en danger ?</strong> La réalse est bien plus nuancée que ce que les gros titres veulent bien nous faire croire.</p>
    <h2>Ce que les chiffres disent vraiment</h2>
    <p>Les études se contredisent. Le rapport McKinsey de 2023 estimait que 30% des tâches de travail pourraient être automatisées d'ici 2030. Pourtant, le Bureau of Labor Statistics américain montre que les secteurs les plus exposés à l'IA ont connu... une <strong>augmentation nette de l'emploi</strong> ces cinq dernières années.</p>

    body: `<p>Bitcoin a franchi la barre symbolique des 100 000 dollars. Les médias s'emballent, les influenceurs crient victoire. Mais derrière les chiffres vertigineux se cache une réalité que très peu osent analyser lucidement.</p>

function renderGrid() {
  const grid = document.getElementById('video-grid');

    <div class="video-card" onclick="openArticle(${v.id})">
      <img class="card-thumb" src="${v.image}" alt="${v.title}">
      ${v.pinned ? '<div class="card-pinned">ÉPINGLÉ</div>' : ''}
      <div class="card-views-bottom">${v.views}</div>
      <div class="card-overlay">
        <div class="card-play"></div>
        <div class="card-views">${v.views} vues</div>
      </div>
    </div>
  `).join('');
}

function openArticle(id) {
  const v = videos.find(x => x.id === id);

  document.getElementById('article-content').innerHTML = `
    

    <div class="article-tags">

    <div class="article-meta">
      <div class="meta-avatar"> </div>
      <div class="meta-text">

        <span class="meta-stat">💬 ${v.comments}</span>
