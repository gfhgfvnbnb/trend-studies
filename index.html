<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #ffffff;
    --surface: #000000;
    --card: #a7a7a7;
    --border: rgba(255,255,255,0.08);
    --text: #000000;
    --muted: #888;
    --accent: #db264d;
    --accent2: #a317b9;
    --font-title: 'Syne', sans-serif;
    --font-mono: 'IBM Plex Mono', monospace;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-title);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ========== NAV ========== */
  nav {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(248, 246, 246, 0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    height: 52px;
  }
  .nav-logo {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -1px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    cursor: pointer;
  }
  .nav-icons { display: flex; gap: 20px; align-items: center; }
  .nav-icon {
    width: 32px; height: 32px;
    border-radius: 50%;
    border: 1.5px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: border-color 0.5s;
    color: var(--muted);
    font-size: 14px;
  }
  .nav-icon:hover { border-color: var(--accent); color: var(--text); }

  /* ========== PAGES ========== */
  .page { display: none; animation: fadeIn 0.25s ease; }
  .page.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

  /* ========== PROFILE PAGE ========== */
  .profile-header {
    max-width: 680px;
    margin: 0 auto;
    padding: 32px 20px 0;
  }
  .profile-top {
    display: flex;
    align-items: flex-start;
    gap: 20px;
    margin-bottom: 20px;
  }
  .avatar-wrap {
    position: relative;
    flex-shrink: 0;
  }
  .avatar {
    width: 88px;
    height: 88px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), #ff9a3c, var(--accent2));
    display: flex; align-items: center; justify-content: center;
    font-size: 32px;
    font-weight: 800;
    color: white;
    letter-spacing: -2px;
    position: relative;
    z-index: 1;
  }
  .avatar-ring {
    position: absolute;
    inset: -3px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    z-index: 0;
    animation: spin 4s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .avatar-ring::after {
    content: '';
    position: absolute;
    inset: 3px;
    border-radius: 50%;
    background: var(--bg);
  }

  .profile-info { flex: 1; }
  .profile-handle {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.5px;
    margin-bottom: 2px;
  }
  .profile-name {

    margin-bottom: 12px;

  .follow-btn {

    border-radius: 4px;

    font-weight: 700;

    letter-spacing: 0.3px;

    margin-bottom: 16px;
  }

  .stat-num {

    font-weight: 800;
    display: block;
    letter-spacing: -0.5px;
  }
  .stat-label {

    color: var(--muted);
    font-family: var(--font-mono);
  }

  .bio {
    font-size: 14px;
    line-height: 1.5;
    color: var(--text);
    margin-bottom: 6px;

  .bio-link {
    font-size: 13px;
    color: var(--accent2);
    font-family: var(--font-mono);
    cursor: pointer;
  }

    margin: 0 auto;
    display: flex;
    border-bottom: 1px solid var(--border);
    margin-top: 20px;
    padding: 0 20px;

  .tab {

    font-size: 14px;
    font-weight: 600;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;

    letter-spacing: 0.3px;

  .tab.active { color: var(--text); border-bottom-color: var(--text); }
  .tab:hover { color: var(--text); }

    margin: 0 auto;
    padding: 4px 20px 60px;
  }
  .video-grid {

    grid-template-columns: repeat(3, 1fr);
    gap: 3px;
    margin-top: 4px;
  }
  .video-card {
    position: relative;
    aspect-ratio: 9/16;
    background: var(--card);
    cursor: pointer;
    overflow: hidden;
    border-radius: 0;
    transition: transform 0.2s;
  }
  .video-card:hover { transform: scale(0.97); z-index: 2; }
  .video-card:hover .card-overlay { opacity: 1; }

  .card-thumb {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .card-bg {
    width: 100%;
    height: 100%;
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
    font-weight: 800;
  }
  .card-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.55);
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.2s;
    flex-direction: column;
    gap: 4px;
  }
  .card-play {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: rgba(255,255,255,0.2);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card-play::after {
    content: '';
    border-left: 14px solid white;
    border-top: 8px solid transparent;
    border-bottom: 8px solid transparent;
    margin-left: 3px;
  }
  .card-views {
    font-size: 11px;
    font-weight: 700;
    color: white;
    font-family: var(--font-mono);
  }

  .card-views-bottom {
    position: absolute;
    bottom: 6px;
    left: 6px;
    display: flex;
    align-items: center;
    gap: 3px;
    font-size: 11px;
    font-weight: 600;
    color: white;
    font-family: var(--font-mono);
    text-shadow: 0 1px 4px rgba(0,0,0,0.8);
  }
  .card-views-bottom::before { content: '▶'; font-size: 9px; }

  .card-pinned {
    position: absolute;
    top: 6px;
    left: 6px;
    background: var(--accent);
    color: white;
    font-size: 9px;
    font-weight: 700;
    padding: 2px 6px;
    border-radius: 2px;
    font-family: var(--font-mono);
    letter-spacing: 0.5px;
  }

  /* ========== ARTICLE PAGE ========== */
  #article-page {
    max-width: 700px;
    margin: 0 auto;
    padding: 0 20px 80px;
  }

  .article-back {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 16px 0;
    cursor: pointer;
    color: var(--muted);
    font-size: 13px;
    font-family: var(--font-mono);

  .article-back:hover { color: var(--text); }
  .article-back::before {
    content: '←';
    font-size: 16px;

  .article-video-frame {
    width: 100%;
    max-width: 320px;
    aspect-ratio: 9/16;

    border-radius: 12px;
    overflow: hidden;

  .progress-fill {

    body: `<p>Depuis l'émergence de ChatGPT et des modèles de langage avancés, une question revient en boucle dans les médias et les conversations de bureau : <strong>nos emplois sont-ils en danger ?</strong> La réalse est bien plus nuancée que ce que les gros titres veulent bien nous faire croire.</p>
    <h2>Ce que les chiffres disent vraiment</h2>
    <p>Les études se contredisent. Le rapport McKinsey de 2023 estimait que 30% des tâches de travail pourraient être automatisées d'ici 2030. Pourtant, le Bureau of Labor Statistics américain montre que les secteurs les plus exposés à l'IA ont connu... une <strong>augmentation nette de l'emploi</strong> ces cinq dernières années.</p>
    <div class="highlight">« L'automatisation n'a jamais détruit le travail dans l'ensemble — elle l'a transformé. La question n'est pas si vous aurez un emploi, mais quel emploi. »</div>
    <p>Les comptables pensaient être remplacés par les tableurs. Les chauffeurs de taxi par les GPS. Les graphistes par Photoshop. Chaque fois, la technologie a amplifié leurs capacités plutôt que de les effacer.</p>
    <h2>Les vrais perdants et gagnants</h2>
    <p>Ce qui est certain : les métiers routiniers et répétitifs — saisie de données, traduction basique, service client de niveau 1 — vont massivement se réduire. Mais des centaines de nouveaux métiers émergent : <strong>prompt engineers, superviseurs d'IA, auditeurs algorithmiques</strong>.</p>
    <p>La vraie fracture ne sera pas entre humains et machines, mais entre ceux qui savent utiliser ces outils et ceux qui les ignorent. La question à se poser n'est plus "est-ce que l'IA va me remplacer ?" mais "est-ce que je vais apprendre à travailler avec elle ?"</p>`

    comments: "654",
    body: `<p>If we are only focusing on the meaning of the word trend applied to the world of social media, its definition can be seen from a much more ancient perspective. The Oxford Language gives us a simple definition, a trend can be explained as “a fashion” which is quite revelatory. The notion of trend, in time, expands to the notion of a movement followed by a large number of persons. We can identify “trends” that mimic the similar schemes that today trends use : a rapid and exponential fame that ultimately results in a rapid abandonment of the given fashion.</p>
    <p>Fashion is extremely visible in the way it evolves from designers' general ideas to the catwalks and in-store sales, which allows us to see the unbelievable power of trends within the industry. A trend evolves as follows: from an individual exploring a new way of dressing, to a social group accepting this way, to the fashion catwalks, and further to brick-and-mortar and online stores as an offer for customers, finally ending up being worn in the streets. </p>
    <p>One famous example of a trend that existed before the internet, and that does not come from the fashion industry, is tulip mania. Tulip Mania (Tulipomania) occurred in Holland during the Dutch Golden Age and has long been considered the first recorded speculative or asset bubble.</p>
    <p>When the tulip was introduced, it immediately became a popular status symbol for the wealthy and the growing middle class. However, the flowers were fragile and it took years for flowers to grow from a seed. After it was discovered that the flower could be grown faster from a bulb, the bulbs became highly coveted. Speculation drove the value of tulip bulbs to extremes, with amounts evaluated to be similar to the price of a house today, and in 1634, tulip mania swept through the country. After a few years the frenzy died down, and by February 1637, prices began to decline. By 1638 prices leveled off. </p>
    <p>Therefore, it is easy to say that trends, from the Tulip Mania in the 17th to the 20th century fashion, have always existed.</p>`

    body: `<p>Bitcoin a franchi la barre symbolique des 100 000 dollars. Les médias s'emballent, les influenceurs crient victoire. Mais derrière les chiffres vertigineux se cache une réalité que très peu osent analyser lucidement.</p>
    <h2>L'adoption institutionnelle : une arme à double tranchant</h2>
    <p>Ce qui a propulsé Bitcoin à ces sommets n'est pas l'adoption "populaire" promise depuis des années, mais l'entrée massive des <strong>fonds institutionnels</strong> — BlackRock, Fidelity, les fonds souverains. C'est paradoxalement exactement ce que les crypto-puristes voulaient éviter.</p>
    <div class="highlight">« Quand les grandes banques contrôlent 40% de l'offre d'un actif censé être décentralisé, on est en droit de se demander ce qu'il reste de la révolution initiale. »</div>
    <p>Ces institutionnels ont des horizons d'investissement et des impératifs de liquidité très différents du "HODLer" classique. Leur entrée stabilise les prix à court terme mais crée des risques systémiques à long terme.</p>
    <h2>Ni tout blanc, ni tout noir</h2>
    <p>La technologie blockchain reste une innovation réelle avec des cas d'usage légitimes. Les transferts internationaux, la désintermédiation financière dans les pays à monnaie instable, les smart contracts — tout cela a de la valeur.</p>
    <p>Mais spéculer sur Bitcoin en pensant que sa valeur est soutenue par ces usages réels, c'est se méprendre sur ce qui fait monter le prix. Ce qui fait monter Bitcoin, c'est l'anticipation que d'autres l'achèteront plus cher. C'est la définition d'une spéculation — pas nécessairement d'une bulle, mais d'un actif dont la valeur dépend fondamentalement de la psychologie collective.</p>`

function renderGrid() {
  const grid = document.getElementById('video-grid');
  grid.innerHTML = videos.map(v => `
    <div class="video-card" onclick="openArticle(${v.id})">
      <img class="card-thumb" src="${v.image}" alt="${v.title}">
      ${v.pinned ? '<div class="card-pinned">ÉPINGLÉ</div>' : ''}
      <div class="card-views-bottom">${v.views}</div>
      <div class="card-overlay">
        <div class="card-play"></div>
        <div class="card-views">${v.views} vues</div>
      </div>
    </div>
  `).join('');
}

function openArticle(id) {
  const v = videos.find(x => x.id === id);
  if (!v) return;

  document.getElementById('article-content').innerHTML = `
    

    <div class="article-tags">
      ${v.tags.map(t => `<span class="tag">${t}</span>`).join('')}
    </div>

    <h1 class="article-title">${v.title}</h1>

    <div class="article-meta">
      <div class="meta-avatar"> </div>
      <div class="meta-text">
        <div class="meta-author">@What_is_a_trend</div>
        <div class="meta-date">${v.date}</div>
      </div>
      <div class="meta-stats">
        <span class="meta-stat">♥ ${v.likes}</span>
        <span class="meta-stat">💬 ${v.comments}</span>
      </div>
    </div>

    <div class="article-body">${v.body}</div>

    <div class="share-row">
      <button class="share-btn">📋 Copier le lien</button>
      <button class="share-btn">💬 Partager</button>
      <button class="share-btn primary">🤍 Liker</button>
    </div>
  `;

  document.getElementById('profile-page').classList.remove('active');
  document.getElementById('article-page').classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function goHome() {
  document.getElementById('article-page').classList.remove('active');
  document.getElementById('profile-page').classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
